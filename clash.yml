############################################
# 基础配置
############################################

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: "127.0.0.1:9090"

############################################
# DNS 设置（fake-ip）
############################################
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

############################################
# 订阅节点（改为你的订阅链接）
############################################
proxy-providers:
  airport:
    url: "【==========这里填写你的订阅地址=========】"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxy-groups:
  - name: 默认
    type: select
    proxies:
      - 自动选择
      - 香港
      - 台湾
      - 新加坡
      - 日本
      - 美国
      - DIRECT

  - name: 自动选择
    type: fallback
    use: [airport]
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 国内
    type: select
    proxies: 
      - DIRECT
      - 默认

  - name: 国外
    type: select
    proxies:
      - 韩国
      - 新加坡
      - 日本
      - 美国

  - name: 香港
    type: fallback
    use: [airport]
    filter: "(?i)香港|hk|hongkong"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 台湾
    type: fallback
    use: [airport]
    filter: "(?i)台湾|tw|taiwan"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 韩国
    type: fallback
    use: [airport]
    filter: "(?i)韩国|hg|sk|korea"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 日本
    type: fallback
    use: [airport]
    filter: "(?i)日本|jp|japan"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 新加坡
    type: fallback
    use: [airport]
    filter: "(?i)新加坡|sg|singapore"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

  - name: 美国
    type: fallback
    use: [airport]
    filter: "(?i)美国|us|unitedstates"
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"

rules:
  - DOMAIN-SUFFIX,skills.sh,默认
  - DOMAIN-SUFFIX,right.codes,DIRECT
  - AND,((DOMAIN,github.com),(DST-PORT,22)),DIRECT

  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,github_domain,自动选择
  - RULE-SET,twitter_domain,默认
  - RULE-SET,youtube_domain,自动选择
  - RULE-SET,google_domain,默认
  - RULE-SET,telegram_domain,国外
  - RULE-SET,netflix_domain,自动选择
  - RULE-SET,bahamut_domain,自动选择
  - RULE-SET,spotify_domain,自动选择
  - RULE-SET,cn_domain,国内
  - RULE-SET,geolocation-!cn,国外

  - RULE-SET,google_ip,自动选择
  - RULE-SET,netflix_ip,自动选择
  - RULE-SET,telegram_ip,国外
  - RULE-SET,twitter_ip,自动选择
  - RULE-SET,cn_ip,国内
  - MATCH,默认

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
rule-providers:
  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  cn_domain:
