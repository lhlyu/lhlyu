############################################
# 基础配置
############################################
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: "127.0.0.1:9090"

############################################
# DNS
############################################
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

############################################
# 订阅
############################################
proxy-providers:
  airport:
    url: "【==========这里填写你的订阅地址=========】"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 180
      timeout: 3000

############################################
# 代理组核心（优化版）
############################################
proxy-group-anchor:
  fallback: &fallback { type: fallback, url: "http://www.gstatic.com/generate_204", interval: 180, tolerance: 50 }

proxy-groups:
  - name: 香港
    use: [airport]
    filter: "(?i)香港|hk|hongkong"
    <<: *fallback

  - name: 台湾
    use: [airport]
    filter: "(?i)台湾|tw"
    <<: *fallback

  - name: 日本
    use: [airport]
    filter: "(?i)日本|jp|japan"
    <<: *fallback

  - name: 新加坡
    use: [airport]
    filter: "(?i)新加坡|sg|singapore"
    <<: *fallback
    
  - name: 韩国
    use: [airport]
    filter: "(?i)韩国|sk|korea"
    <<: *fallback

  - name: 美国
    use: [airport]
    filter: "(?i)美国|us|unitedstates"
    <<: *fallback
    
  - name: 国外
    type: select
    proxies:
      - 韩国
      - 日本
      - 新加坡
      - 美国

  - name: 自动
    type: url-test
    use: [airport]
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 50

  - name: 手动
    type: select
    use: [airport]

rules:
  - DOMAIN-SUFFIX,skills.sh,自动
  - DOMAIN-SUFFIX,right.codes,DIRECT
  - DOMAIN-SUFFIX,su8.codes,DIRECT
  - DOMAIN-SUFFIX,linux.do,自动
  - DOMAIN-SUFFIX,v2ex.com,自动
  - DOMAIN-SUFFIX,withgoogle.com,国外
  - AND,((DOMAIN,github.com),(DST-PORT,22)),DIRECT

  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,github_domain,自动
  - RULE-SET,twitter_domain,自动
  - RULE-SET,youtube_domain,自动
  - RULE-SET,google_domain,自动
  - RULE-SET,telegram_domain,国外
  - RULE-SET,netflix_domain,自动
  - RULE-SET,bahamut_domain,自动
  - RULE-SET,spotify_domain,自动
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,geolocation-!cn,国外

  - RULE-SET,google_ip,自动
  - RULE-SET,netflix_ip,自动
  - RULE-SET,telegram_ip,国外
  - RULE-SET,twitter_ip,自动
  - RULE-SET,cn_ip,DIRECT
  - MATCH,自动

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
rule-providers:
  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  cn_domain:
